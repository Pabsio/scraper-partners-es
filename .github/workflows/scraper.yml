name: Oferta Scraper + Build

on:
  schedule:
    - cron: "0 7,11,16 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 playwright flask google-genai lxml

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 main.py

      - name: Build static HTML
        run: python3 build.py

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ofertas.db docs/index.html
          git diff --staged --quiet || git commit -m "chore: scrape + build $(date +'%Y-%m-%d %H:%M')"
          git push
